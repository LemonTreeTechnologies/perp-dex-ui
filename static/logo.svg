<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 80" width="240" height="80" role="img" aria-label="XPerp logo">
  <title>XPerp</title>
  <desc>XPerp wordmark with infinity-loop X mark in XRP blue</desc>
  <!-- Mark: infinity-loop X -->
  <g transform="translate(40, 40)">
    <path d="M -28 -20 Q -7 0 -28 20 Q 0 28 28 20 Q 7 0 28 -20 Q 0 -28 -28 -20 Z"
          fill="none" stroke="#00aae4" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="3" fill="#00aae4"/>
  </g>
  <!-- Wordmark -->
  <text x="82" y="50"
        font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif"
        font-size="32" font-weight="500" letter-spacing="-1">
    <tspan fill="#00aae4">X</tspan><tspan fill="#ffffff">Perp</tspan>
  </text>
</svg>
