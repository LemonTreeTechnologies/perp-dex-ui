version: '3.8'

services:
  # Development environment
  perp-dex-ui-dev:
    build:
      context: .
      target: development
      args:
        - VITE_API_URL=https://api-dev.xperp.fi
        - VITE_WS_URL=wss://api-dev.xperp.fi/ws
    container_name: perp-dex-ui-dev
    ports:
      - '5173:5173'
    volumes:
      # Mount source code for hot reloading
      - ./src:/app/src
      - ./static:/app/static
      - ./svelte.config.js:/app/svelte.config.js
      - ./vite.config.ts:/app/vite.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      # Preserve node_modules
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=https://api-dev.xperp.fi
      - VITE_WS_URL=wss://api-dev.xperp.fi/ws
    networks:
      - perp-dex-network
    profiles:
      - dev

  # Production environment
  perp-dex-ui-prod:
    build:
      context: .
      target: production
      args:
        - VITE_API_URL=https://api.xperp.fi
        - VITE_WS_URL=wss://api.xperp.fi/ws
    container_name: perp-dex-ui-prod
    ports:
      - '80:80'
      - '443:443'
    volumes:
      # Persist Caddy data (certificates, etc.)
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    networks:
      - perp-dex-network
    profiles:
      - prod

networks:
  perp-dex-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
